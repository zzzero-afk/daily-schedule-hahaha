<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>手帳 · 我的行事曆</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#FAF8F5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="手帳">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#FAF8F5;
    --ink:#2B2825;
    --muted:#8C8579;
    --accent:#C75D3D;
    --accent-soft:#EADDD6;
    --done:#B8B2A6;
    --line:#E8E3DA;
    --card:#FFFFFF;
    --radius:14px;
    --shadow:0 2px 10px rgba(43,40,37,0.05);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  h1,h2,h3{font-family:'Noto Serif TC', serif; margin:0;}
  button{font-family:inherit;}

  /* ---------- 登入畫面 ---------- */
  #login-screen{
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:28px; background:var(--bg); z-index:100; padding:24px; text-align:center;
  }
  #login-screen .brand-mark{
    font-family:'Noto Serif TC', serif;
    font-size:15px; letter-spacing:0.4em; color:var(--muted);
  }
  #login-screen h1{font-size:32px; font-weight:700;}
  #login-screen p{color:var(--muted); font-size:14px; max-width:280px; line-height:1.7; margin:0;}
  .google-btn{
    display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:13px 26px; font-size:15px; font-weight:500; color:var(--ink);
    cursor:pointer; box-shadow:var(--shadow); transition:transform .15s ease, box-shadow .15s ease;
  }
  .google-btn:hover{transform:translateY(-1px); box-shadow:0 4px 14px rgba(43,40,37,0.09);}
  .google-btn svg{width:18px; height:18px;}
  #login-error{color:var(--accent); font-size:13px; min-height:18px;}

  /* ---------- App Shell ---------- */
  #app{display:none; max-width:760px; margin:0 auto; padding:18px 18px 80px;}
  #app.visible{display:block;}

  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 2px 18px; gap:10px;
  }
  .topbar-left{display:flex; align-items:baseline; gap:10px;}
  .topbar-left .eyebrow{font-size:11px; letter-spacing:0.25em; color:var(--muted); font-weight:500;}
  .topbar-left h1{font-size:22px;}
  .topbar-right{display:flex; align-items:center; gap:10px;}
  #user-avatar{width:30px; height:30px; border-radius:50%; border:1px solid var(--line); cursor:pointer;}
  #logout-btn{
    border:none; background:none; color:var(--muted); font-size:12px; cursor:pointer;
    text-decoration:underline; padding:4px;
  }

  /* 視圖切換 */
  .view-switch{
    display:flex; background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:3px; gap:2px; width:fit-content; margin:0 auto 18px;
  }
  .view-switch button{
    border:none; background:none; padding:7px 18px; border-radius:999px; font-size:13px;
    color:var(--muted); cursor:pointer; transition:all .15s ease; font-weight:500;
  }
  .view-switch button.active{background:var(--ink); color:var(--bg);}

  /* 月份導覽 */
  .nav-row{display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:14px; flex-wrap:nowrap;}
  .nav-row button{
    border:none; background:none; color:var(--muted); cursor:pointer;
    width:30px; height:30px; border-radius:50%; font-size:16px;
    display:flex; align-items:center; justify-content:center; flex:0 0 auto;
  }
  .nav-row button:hover{background:var(--accent-soft); color:var(--accent);}
  .nav-row .period-label{font-size:16px; font-weight:500; min-width:130px; text-align:center; font-family:'Noto Serif TC',serif;}
  .today-btn{
    font-size:11px; color:var(--accent); border:1px solid var(--accent-soft); background:var(--accent-soft);
    border-radius:999px; padding:3px 11px; cursor:pointer; margin-left:4px; white-space:nowrap; flex:0 0 auto;
  }

  /* ---------- 週檢視 ---------- */
  #week-view .day-row{
    display:flex; align-items:flex-start; gap:12px;
    padding:14px 4px; border-bottom:1px solid var(--line); cursor:pointer;
    transition:background .12s ease;
  }
  #week-view .day-row:hover{background:rgba(0,0,0,0.015);}
  #week-view .day-row:last-child{border-bottom:none;}
  .day-date-badge{
    flex:0 0 46px; text-align:center; padding-top:2px;
  }
  .day-date-badge .dow{font-size:11px; color:var(--muted); display:block; margin-bottom:2px;}
  .day-date-badge .num{font-size:18px; font-weight:700; font-family:'Noto Serif TC',serif;}
  .day-row.is-today .day-date-badge .num{
    color:var(--bg); background:var(--accent); border-radius:50%;
    width:30px; height:30px; display:flex; align-items:center; justify-content:center; margin:0 auto;
  }
  .day-summary{flex:1; min-width:0;}
  .day-summary .task-line{
    font-size:13.5px; color:var(--ink); padding:2px 0; display:flex; align-items:center; gap:7px;
  }
  .day-summary .task-line.done{color:var(--done); text-decoration:line-through;}
  .day-summary .task-dot{width:5px; height:5px; border-radius:50%; background:var(--accent); flex:0 0 auto;}
  .day-summary .task-line.done .task-dot{background:var(--done);}
  .day-summary .empty-hint{font-size:12.5px; color:var(--muted); font-style:italic;}
  .day-summary .more-hint{font-size:11.5px; color:var(--muted); margin-top:2px;}
  .diary-flag{
    flex:0 0 auto; width:7px; height:7px; border-radius:50%; background:var(--accent);
    margin-top:8px; opacity:0.6;
  }

  /* ---------- 月檢視 ---------- */
  .month-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
  .month-dow{text-align:center; font-size:11px; color:var(--muted); padding-bottom:6px;}
  .month-cell{
    aspect-ratio:1/1; border-radius:10px; border:1px solid var(--line); background:var(--card);
    padding:6px 5px; cursor:pointer; display:flex; flex-direction:column; gap:3px;
    transition:background .12s ease, border-color .12s ease; position:relative; overflow:hidden;
  }
  .month-cell:hover{border-color:var(--accent-soft);}
  .month-cell.outside{opacity:0.32;}
  .month-cell .cell-num{font-size:12.5px; font-weight:500; font-family:'Noto Serif TC',serif;}
  .month-cell.is-today{border-color:var(--accent); background:var(--accent-soft);}
  .month-cell.is-today .cell-num{color:var(--accent); font-weight:700;}
  .month-cell .cell-dots{display:flex; gap:2px; flex-wrap:wrap; margin-top:auto;}
  .month-cell .dot{width:4px; height:4px; border-radius:50%; background:var(--accent);}
  .month-cell .dot.done{background:var(--done);}
  .month-cell .diary-mark{
    position:absolute; top:5px; right:6px; width:5px; height:5px; border-radius:50%;
    background:var(--ink); opacity:0.3;
  }

  /* ---------- 日期詳情卡（共用） ---------- */
  #day-detail{display:none; margin-top:20px;}
  #day-detail.visible{display:block;}
  .detail-card{
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    border-left:3px solid var(--accent); padding:20px 22px; position:relative;
  }
  .detail-card .detail-head{
    display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px;
  }
  .detail-card .detail-date{font-size:18px; font-family:'Noto Serif TC',serif; font-weight:700;}
  .detail-card .detail-sub{font-size:12px; color:var(--muted); margin-left:8px;}
  .close-detail{border:none; background:none; color:var(--muted); font-size:20px; cursor:pointer; line-height:1; padding:2px 6px;}

  .task-list{margin-bottom:18px;}
  .task-item{
    display:flex; align-items:flex-start; gap:10px; padding:7px 0; font-size:14.5px;
  }
  .task-checkbox{
    flex:0 0 auto; width:19px; height:19px; border-radius:5px; border:1.5px solid var(--line);
    cursor:pointer; margin-top:1px; display:flex; align-items:center; justify-content:center;
    transition:all .12s ease; background:var(--card);
  }
  .task-checkbox.checked{background:var(--accent); border-color:var(--accent);}
  .task-checkbox.checked::after{
    content:''; width:9px; height:6px; border-left:2px solid white; border-bottom:2px solid white;
    transform:rotate(-45deg) translate(0,-1px);
  }
  .task-text{flex:1; word-break:break-word; line-height:1.5; padding-top:0.5px;}
  .task-text.done{color:var(--done); text-decoration:line-through;}
  .task-del{
    border:none; background:none; color:var(--muted); opacity:0; cursor:pointer; font-size:15px;
    padding:0 4px; transition:opacity .12s ease;
  }
  .task-item:hover .task-del{opacity:0.6;}
  .task-del:hover{opacity:1 !important; color:var(--accent);}

  .add-task-row{display:flex; gap:8px; margin-top:10px;}
  .add-task-row input{
    flex:1; border:1px solid var(--line); border-radius:8px; padding:9px 12px; font-size:14px;
    font-family:inherit; background:var(--bg); color:var(--ink);
  }
  .add-task-row input:focus{outline:none; border-color:var(--accent);}
  .add-task-row button{
    border:none; background:var(--ink); color:var(--bg); border-radius:8px; padding:9px 16px;
    font-size:14px; cursor:pointer; font-weight:500;
  }
  .add-task-row button:hover{background:var(--accent);}

  .diary-section label{
    font-size:11.5px; letter-spacing:0.15em; color:var(--muted); font-weight:500; display:block; margin-bottom:6px;
  }
  .diary-section textarea{
    width:100%; min-height:110px; border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; font-size:14px; font-family:inherit; resize:vertical;
    background:var(--bg); color:var(--ink); line-height:1.6;
  }
  .diary-section textarea:focus{outline:none; border-color:var(--accent);}
  .save-indicator{font-size:11px; color:var(--muted); margin-top:6px; height:14px; transition:opacity .3s ease;}

  /* ---------- 載入中 ---------- */
  #loading-screen{
    position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center;
    z-index:200; color:var(--muted); font-size:13px; letter-spacing:0.1em;
  }

  @media (max-width:480px){
    .day-date-badge{flex:0 0 38px;}
    .detail-card{padding:16px;}
    .month-cell{padding:4px 3px;}
  }
</style>
</head>
<body>

<div id="loading-screen">載入中 ···</div>

<!-- 登入畫面 -->
<div id="login-screen" style="display:none;">
  <div class="brand-mark">JOURNAL · PLANNER</div>
  <h1>我的手帳</h1>
  <p>一個安靜記事的地方。登入後，所有待辦與日記會即時同步到你的所有裝置。</p>
  <button class="google-btn" id="google-login-btn">
    <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.5 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.5 29.6 4 24 4c-7.4 0-13.8 4.2-17 10.7z"/><path fill="#4CAF50" d="M24 44c5.4 0 10.3-2.1 14-5.5l-6.5-5.4C29.4 35 26.8 36 24 36c-5.3 0-9.7-3.1-11.3-7.6l-6.6 5.1C9.9 39.7 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.4 5.6-6.3 7.1l6.5 5.4C39.5 37.2 44 31.5 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
    使用 Google 帳號登入
  </button>
  <div id="login-error"></div>
</div>

<!-- 主應用 -->
<div id="app">
  <header class="topbar">
    <div class="topbar-left">
      <span class="eyebrow">JOURNAL</span>
      <h1>手帳</h1>
    </div>
    <div class="topbar-right">
      <img id="user-avatar" src="" alt="使用者">
      <button id="logout-btn">登出</button>
    </div>
  </header>

  <div class="view-switch">
    <button id="btn-week-view" class="active">週計畫</button>
    <button id="btn-month-view">月計畫</button>
  </div>

  <div class="nav-row">
    <button id="nav-prev">‹</button>
    <span class="period-label" id="period-label">—</span>
    <button id="nav-next">›</button>
    <button class="today-btn" id="nav-today">今天</button>
  </div>

  <!-- 週檢視 -->
  <div id="week-view"></div>

  <!-- 月檢視 -->
  <div id="month-view" style="display:none;">
    <div class="month-grid" id="month-dow-row"></div>
    <div class="month-grid" id="month-grid" style="margin-top:6px;"></div>
  </div>

  <!-- 日期詳情卡 -->
  <div id="day-detail">
    <div class="detail-card">
      <button class="close-detail" id="close-detail-btn">×</button>
      <div class="detail-head">
        <div><span class="detail-date" id="detail-date-label"></span><span class="detail-sub" id="detail-dow-label"></span></div>
      </div>

      <div class="task-list" id="task-list"></div>
      <div class="add-task-row">
        <input type="text" id="new-task-input" placeholder="新增待辦事項，按 Enter 送出">
        <button id="add-task-btn">新增</button>
      </div>

      <div class="diary-section" style="margin-top:22px;">
        <label>今日小日記</label>
        <textarea id="diary-textarea" placeholder="寫點什麼吧 ···"></textarea>
        <div class="save-indicator" id="save-indicator"></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* ============================================================
   Firebase 設定 — 請替換成你自己 Firebase 專案的金鑰
   ============================================================ */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY_HERE",
  authDomain: "YOUR_AUTH_DOMAIN_HERE",
  projectId: "YOUR_PROJECT_ID_HERE",
  storageBucket: "YOUR_STORAGE_BUCKET_HERE",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID_HERE",
  appId: "YOUR_APP_ID_HERE"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ============================================================
   全域狀態
   ============================================================ */
let currentUser = null;
let currentView = 'week';        // 'week' | 'month'
let anchorDate = new Date();      // 目前週/月檢視所基準的日期
let selectedDateStr = null;       // 詳情卡目前開啟的日期 'YYYY-MM-DD'
let daysData = {};                // { 'YYYY-MM-DD': { tasks:[{id,text,done}], diary:'' } }
let unsubscribeSnapshot = null;
let diarySaveTimer = null;

const WEEKDAY_LABELS = ['一','二','三','四','五','六','日'];
const WEEKDAY_LABELS_SHORT = ['週一','週二','週三','週四','週五','週六','週日'];

/* ============================================================
   日期工具（週一為一週起始）
   ============================================================ */
function pad2(n){ return String(n).padStart(2,'0'); }

function toDateStr(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}

function fromDateStr(s){
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function isSameDay(a,b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

// 取得該日期所在那一週的週一
function getMondayOfWeek(d){
  const date = new Date(d);
  const dow = date.getDay(); // 0=週日 ... 6=週六
  const diff = (dow === 0 ? -6 : 1 - dow); // 轉換成週一為起點
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}

function addDays(d, n){
  const date = new Date(d);
  date.setDate(date.getDate() + n);
  return date;
}

function addMonths(d, n){
  const date = new Date(d);
  date.setMonth(date.getMonth() + n);
  return date;
}

/* ============================================================
   Firebase Auth
   ============================================================ */
const googleProvider = new firebase.auth.GoogleAuthProvider();

document.getElementById('google-login-btn').addEventListener('click', () => {
  document.getElementById('login-error').textContent = '';
  auth.signInWithPopup(googleProvider).catch(err => {
    console.error(err);
    document.getElementById('login-error').textContent = '登入失敗，請再試一次。';
  });
});

document.getElementById('logout-btn').addEventListener('click', () => {
  auth.signOut();
});

auth.onAuthStateChanged(user => {
  document.getElementById('loading-screen').style.display = 'none';
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('user-avatar').src = user.photoURL || '';
    attachFirestoreListener();
    renderCurrentView();
  } else {
    currentUser = null;
    if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
    daysData = {};
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').classList.remove('visible');
    document.getElementById('day-detail').classList.remove('visible');
  }
});

/* ============================================================
   Firestore 結構：
   users/{uid}/days/{YYYY-MM-DD}  →  { tasks: [{id,text,done}], diary: "" }
   使用 onSnapshot 即時監聽整個 days collection，
   讓多裝置打勾/寫日記能立刻同步。
   ============================================================ */
function attachFirestoreListener() {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  const daysRef = db.collection('users').doc(currentUser.uid).collection('days');
  unsubscribeSnapshot = daysRef.onSnapshot(snapshot => {
    snapshot.docChanges().forEach(change => {
      const dateStr = change.doc.id;
      if (change.type === 'removed') {
        delete daysData[dateStr];
      } else {
        daysData[dateStr] = change.doc.data();
      }
    });
    renderCurrentView();
    if (selectedDateStr) renderDayDetail(selectedDateStr);
  }, err => {
    console.error('Firestore 監聽錯誤:', err);
  });
}

function getDayDoc(dateStr) {
  return db.collection('users').doc(currentUser.uid).collection('days').doc(dateStr);
}

function getDayData(dateStr) {
  return daysData[dateStr] || { tasks: [], diary: '' };
}

async function ensureDayDoc(dateStr) {
  if (!daysData[dateStr]) {
    daysData[dateStr] = { tasks: [], diary: '' };
  }
}

/* 新增待辦事項 */
async function addTask(dateStr, text) {
  const trimmed = text.trim();
  if (!trimmed) return;
  await ensureDayDoc(dateStr);
  const newTask = { id: Date.now().toString(36) + Math.random().toString(36).slice(2,7), text: trimmed, done: false };
  const current = getDayData(dateStr);
  const tasks = [...(current.tasks || []), newTask];
  await getDayDoc(dateStr).set({ tasks, diary: current.diary || '' }, { merge: true });
}

/* 切換打勾狀態 */
async function toggleTask(dateStr, taskId) {
  const current = getDayData(dateStr);
  const tasks = (current.tasks || []).map(t => t.id === taskId ? { ...t, done: !t.done } : t);
  await getDayDoc(dateStr).set({ tasks }, { merge: true });
}

/* 刪除待辦事項 */
async function deleteTask(dateStr, taskId) {
  const current = getDayData(dateStr);
  const tasks = (current.tasks || []).filter(t => t.id !== taskId);
  await getDayDoc(dateStr).set({ tasks }, { merge: true });
}

/* 儲存日記（debounce 自動儲存） */
function scheduleDiarySave(dateStr, text) {
  clearTimeout(diarySaveTimer);
  const indicator = document.getElementById('save-indicator');
  indicator.textContent = '正在輸入 ···';
  diarySaveTimer = setTimeout(async () => {
    await ensureDayDoc(dateStr);
    const current = getDayData(dateStr);
    await getDayDoc(dateStr).set({ diary: text, tasks: current.tasks || [] }, { merge: true });
    indicator.textContent = '已自動儲存 ✓';
    setTimeout(() => { if (indicator.textContent === '已自動儲存 ✓') indicator.textContent=''; }, 2000);
  }, 700);
}

/* ============================================================
   視圖切換
   ============================================================ */
document.getElementById('btn-week-view').addEventListener('click', () => switchView('week'));
document.getElementById('btn-month-view').addEventListener('click', () => switchView('month'));

function switchView(view) {
  currentView = view;
  document.getElementById('btn-week-view').classList.toggle('active', view === 'week');
  document.getElementById('btn-month-view').classList.toggle('active', view === 'month');
  document.getElementById('week-view').style.display = view === 'week' ? 'block' : 'none';
  document.getElementById('month-view').style.display = view === 'month' ? 'block' : 'none';
  renderCurrentView();
}

document.getElementById('nav-prev').addEventListener('click', () => {
  anchorDate = currentView === 'week' ? addDays(anchorDate, -7) : addMonths(anchorDate, -1);
  renderCurrentView();
});
document.getElementById('nav-next').addEventListener('click', () => {
  anchorDate = currentView === 'week' ? addDays(anchorDate, 7) : addMonths(anchorDate, 1);
  renderCurrentView();
});
document.getElementById('nav-today').addEventListener('click', () => {
  anchorDate = new Date();
  renderCurrentView();
});

function renderCurrentView() {
  if (!currentUser) return;
  if (currentView === 'week') renderWeekView();
  else renderMonthView();
}

/* ============================================================
   週檢視
   ============================================================ */
function renderWeekView() {
  const monday = getMondayOfWeek(anchorDate);
  const sunday = addDays(monday, 6);
  document.getElementById('period-label').textContent =
    `${monday.getFullYear()}/${pad2(monday.getMonth()+1)}/${pad2(monday.getDate())} – ${pad2(sunday.getMonth()+1)}/${pad2(sunday.getDate())}`;

  const container = document.getElementById('week-view');
  container.innerHTML = '';
  const today = new Date();

  for (let i = 0; i < 7; i++) {
    const d = addDays(monday, i);
    const dateStr = toDateStr(d);
    const data = getDayData(dateStr);
    const tasks = data.tasks || [];

    const row = document.createElement('div');
    row.className = 'day-row' + (isSameDay(d, today) ? ' is-today' : '');
    row.dataset.date = dateStr;

    const badge = document.createElement('div');
    badge.className = 'day-date-badge';
    badge.innerHTML = `<span class="dow">${WEEKDAY_LABELS_SHORT[i]}</span><span class="num">${d.getDate()}</span>`;

    const summary = document.createElement('div');
    summary.className = 'day-summary';
    if (tasks.length === 0) {
      summary.innerHTML = `<div class="empty-hint">沒有待辦事項</div>`;
    } else {
      const visible = tasks.slice(0, 3);
      visible.forEach(t => {
        const line = document.createElement('div');
        line.className = 'task-line' + (t.done ? ' done' : '');
        line.innerHTML = `<span class="task-dot"></span><span>${escapeHtml(t.text)}</span>`;
        summary.appendChild(line);
      });
      if (tasks.length > 3) {
        const more = document.createElement('div');
        more.className = 'more-hint';
        more.textContent = `還有 ${tasks.length - 3} 項 ···`;
        summary.appendChild(more);
      }
    }

    row.appendChild(badge);
    row.appendChild(summary);

    if (data.diary && data.diary.trim()) {
      const flag = document.createElement('div');
      flag.className = 'diary-flag';
      flag.title = '今日有日記';
      row.appendChild(flag);
    }

    row.addEventListener('click', () => openDayDetail(dateStr));
    container.appendChild(row);
  }
}

/* ============================================================
   月檢視
   ============================================================ */
function renderMonthView() {
  const year = anchorDate.getFullYear();
  const month = anchorDate.getMonth();
  document.getElementById('period-label').textContent = `${year} 年 ${month+1} 月`;

  const dowRow = document.getElementById('month-dow-row');
  dowRow.innerHTML = WEEKDAY_LABELS.map(l => `<div class="month-dow">${l}</div>`).join('');

  const grid = document.getElementById('month-grid');
  grid.innerHTML = '';

  const firstOfMonth = new Date(year, month, 1);
  const startDate = getMondayOfWeek(firstOfMonth);
  const lastOfMonth = new Date(year, month + 1, 0);
  const endDate = getMondayOfWeek(lastOfMonth);
  const totalCells = Math.round((addDays(endDate,6) - startDate) / 86400000) + 1;

  const today = new Date();

  for (let i = 0; i < totalCells; i++) {
    const d = addDays(startDate, i);
    const dateStr = toDateStr(d);
    const data = getDayData(dateStr);
    const tasks = data.tasks || [];
    const outside = d.getMonth() !== month;

    const cell = document.createElement('div');
    cell.className = 'month-cell' + (outside ? ' outside' : '') + (isSameDay(d, today) ? ' is-today' : '');
    cell.dataset.date = dateStr;

    let dotsHtml = '';
    if (tasks.length > 0) {
      dotsHtml = '<div class="cell-dots">' +
        tasks.slice(0,6).map(t => `<span class="dot${t.done ? ' done' : ''}"></span>`).join('') +
        '</div>';
    }
    const diaryMark = (data.diary && data.diary.trim()) ? '<div class="diary-mark" title="今日有日記"></div>' : '';

    cell.innerHTML = `<span class="cell-num">${d.getDate()}</span>${diaryMark}${dotsHtml}`;
    cell.addEventListener('click', () => openDayDetail(dateStr));
    grid.appendChild(cell);
  }
}

/* ============================================================
   日期詳情卡
   ============================================================ */
function openDayDetail(dateStr) {
  selectedDateStr = dateStr;
  renderDayDetail(dateStr);
  document.getElementById('day-detail').classList.add('visible');
  document.getElementById('day-detail').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

document.getElementById('close-detail-btn').addEventListener('click', () => {
  document.getElementById('day-detail').classList.remove('visible');
  selectedDateStr = null;
});

function renderDayDetail(dateStr) {
  const d = fromDateStr(dateStr);
  const dow = (d.getDay() + 6) % 7; // 轉換成 0=週一
  document.getElementById('detail-date-label').textContent =
    `${d.getFullYear()}/${pad2(d.getMonth()+1)}/${pad2(d.getDate())}`;
  document.getElementById('detail-dow-label').textContent = WEEKDAY_LABELS_SHORT[dow];

  const data = getDayData(dateStr);
  const tasks = data.tasks || [];

  const list = document.getElementById('task-list');
  list.innerHTML = '';
  if (tasks.length === 0) {
    list.innerHTML = `<div class="empty-hint" style="padding:6px 0;">今天還沒有待辦事項</div>`;
  } else {
    tasks.forEach(t => {
      const item = document.createElement('div');
      item.className = 'task-item';
      item.innerHTML = `
        <div class="task-checkbox${t.done ? ' checked' : ''}" data-id="${t.id}"></div>
        <div class="task-text${t.done ? ' done' : ''}">${escapeHtml(t.text)}</div>
        <button class="task-del" data-id="${t.id}">×</button>
      `;
      item.querySelector('.task-checkbox').addEventListener('click', () => toggleTask(dateStr, t.id));
      item.querySelector('.task-del').addEventListener('click', () => deleteTask(dateStr, t.id));
      list.appendChild(item);
    });
  }

  const textarea = document.getElementById('diary-textarea');
  // 避免使用者正在輸入時被遠端同步覆寫游標位置
  if (document.activeElement !== textarea) {
    textarea.value = data.diary || '';
  }
  document.getElementById('save-indicator').textContent = '';
}

document.getElementById('add-task-btn').addEventListener('click', submitNewTask);
document.getElementById('new-task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitNewTask();
});

function submitNewTask() {
  const input = document.getElementById('new-task-input');
  if (!selectedDateStr || !input.value.trim()) return;
  addTask(selectedDateStr, input.value);
  input.value = '';
}

document.getElementById('diary-textarea').addEventListener('input', e => {
  if (!selectedDateStr) return;
  scheduleDiarySave(selectedDateStr, e.target.value);
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ============================================================
   Service Worker 註冊（PWA）
   ============================================================ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW 註冊失敗:', err));
  });
}
</script>
