<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>P人消滅計畫</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#FAF8F5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="P人自有妙計">
<link class="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#FAF8F5;
    --ink:#2B2825;
    --muted:#8C8579;
    --accent:#C75D3D;
    --accent-soft:#EADDD6;
    --done:#B8B2A6;
    --line:#E8E3DA;
    --card:#FFFFFF;
    --radius:14px;
    --shadow:0 2px 10px rgba(43,40,37,0.05);

    /* 莫蘭迪標籤庫 */
    --tag-none: #E8E3DA;
    --tag-red: #B87D73;    
    --tag-green: #8A9A86;  
    --tag-blue: #7E8F9F;   
    --tag-yellow: #C2A675; 
    --tag-purple:  #9E8EAD;  
    --tag-gray: #9FA09E;   
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  h1,h2,h3{font-family:'Noto Serif TC', serif; margin:0;}
  button, input, select, textarea{font-family:inherit;}

  /* ---------- 登入畫面 ---------- */
  #login-screen{
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:28px; background:var(--bg); z-index:100; padding:24px; text-align:center;
  }
  #login-screen .brand-mark{ font-family:'Noto Serif TC', serif; font-size:15px; letter-spacing:0.4em; color:var(--muted); }
  #login-screen h1{font-size:32px; font-weight:700;}
  #login-screen p{color:var(--muted); font-size:14px; max-width:280px; line-height:1.7; margin:0;}
  .google-btn{
    display:flex; align-items:center; gap:10px;
    background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:13px 26px; font-size:15px; font-weight:500; color:var(--ink);
    cursor:pointer; box-shadow:var(--shadow); transition:transform .15s ease, box-shadow .15s ease;
  }
  .google-btn svg{width:18px; height:18px;}
  #login-error{color:var(--accent); font-size:13px; min-height:18px;}

  /* ---------- App Shell ---------- */
  #app{display:none; max-width:1400px; margin:0 auto; padding:18px 24px 80px;}
  #app.visible{display:block;}

  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 2px 18px; gap:10px; border-bottom:1px solid var(--line); margin-bottom:20px;
  }
  .topbar-left{display:flex; align-items:baseline; gap:10px;}
  .topbar-left .eyebrow{font-size:11px; letter-spacing:0.25em; color:var(--muted); font-weight:500;}
  .topbar-left h1{font-size:22px;}
  .topbar-right{display:flex; align-items:center; gap:10px;}
  #user-avatar{width:30px; height:30px; border-radius:50%; border:1px solid var(--line); cursor:pointer;}
  #logout-btn{ border:none; background:none; color:var(--muted); font-size:12px; cursor:pointer; text-decoration:underline; padding:4px; }

  /* 控制列 */
  .control-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:14px; }
  .view-switch{ display:flex; background:var(--card); border:1px solid var(--line); border-radius:999px; padding:3px; gap:2px; }
  .view-switch button{ border:none; background:none; padding:7px 18px; border-radius:999px; font-size:13px; color:var(--muted); cursor:pointer; font-weight:500; }
  .view-switch button.active{background:var(--ink); color:var(--bg);}

  .nav-row{display:flex; align-items:center; gap:10px;}
  .nav-row button{ border:none; background:none; color:var(--muted); cursor:pointer; width:30px; height:30px; border-radius:50%; font-size:16px; display:flex; align-items:center; justify-content:center; }
  .nav-row button:hover{background:var(--accent-soft); color:var(--accent);}
  .nav-row .period-label{font-size:16px; font-weight:500; min-width:130px; text-align:center; font-family:'Noto Serif TC',serif;}
  .today-btn{ font-size:11px; color:var(--accent); border:1px solid var(--accent-soft); background:var(--accent-soft); border-radius:999px; padding:3px 11px; cursor:pointer; }

  .week-title-area { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--line); padding: 4px 12px; border-radius: 8px; }
  .week-title-display { font-size: 13.5px; font-weight: 500; color: var(--ink); }
  .week-title-input { border: none; background: transparent; font-size: 13.5px; color: var(--ink); outline: none; width: 140px; display: none; }
  .week-title-btn { border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; }

  /* ---------- 主版面雙欄架構 ---------- */
  .workspace-layout { display: grid; grid-template-columns: 320px 1fr; gap: 24px; align-items: start; }
  .side-panel { display: flex; flex-direction: column; gap: 16px; }
  .panel-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--line); box-shadow: var(--shadow); padding: 18px; }
  .panel-card h3 { font-size: 15px; margin-bottom: 12px; border-left: 3px solid var(--ink); padding-left: 8px; color: var(--ink); }
  
  /* 頂部整合看板（分數 + 記帳統計） */
  .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-mini-box { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow); }
  .stat-mini-box .title { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stat-mini-box .num { font-size: 20px; font-weight: 700; font-family: 'Noto Serif TC', serif; }
  
  .score-box-dark { background: linear-gradient(135deg, #2B2825, #44403C); color: #fff; border: none; }
  .score-box-dark .title { color: #C8C2B7; }
  .score-box-dark .num.positive { color: #81C784; }
  .score-box-dark .num.negative { color: #E57373; }

  .month-goal-textarea { width: 100%; min-height: 70px; border: 1px solid var(--line); border-radius: 8px; padding: 10px; font-size: 13.5px; background: var(--bg); color: var(--ink); resize: none; outline: none; }

  /* 色彩標籤 */
  .color-picker { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
  .color-dot { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .color-dot.active { transform: scale(1.2); border-color: var(--ink); }

  .pool-input-area { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; background: var(--bg); padding: 8px; border-radius: 8px; border: 1px solid var(--line); }
  .pool-input-row { display: flex; gap: 6px; }
  .pool-input-row input { flex: 1; border: 1px solid var(--line); border-radius: 6px; padding: 7px 10px; font-size: 13px; background: var(--card); outline: none; }
  .pool-input-row button { border: none; background: var(--ink); color: var(--bg); padding: 0 12px; font-size: 13px; border-radius: 6px; cursor: pointer; }
  .pool-note-input { width: 100%; border: 1px solid var(--line); border-radius: 4px; padding: 4px 6px; font-size: 11px; outline: none; }

  .pool-list { display: flex; flex-direction: column; gap: 8px; }
  .pool-item { background: var(--card); padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 6px; font-size: 13px; border: 1px solid var(--line); position: relative; }
  .pool-item-text { word-break: break-word; font-weight: 500; line-height: 1.4; }
  .pool-item-del { position: absolute; right: 6px; top: 6px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 14px; opacity: 0.5; }
  .pool-item:hover .pool-item-del { opacity: 1; }

  /* 備註可直接編輯樣式 */
  .editable-note-span { display: block; cursor: pointer; font-size: 11.5px; color: var(--muted); background: rgba(43,40,37,0.04); padding: 4px 6px; border-radius: 4px; margin-top: 4px; font-style: italic; border: 1px dashed transparent; }
  .editable-note-span:hover { border-color: var(--muted); background: rgba(43,40,37,0.07); }
  .note-edit-input { width: 100%; font-size: 11.5px; padding: 3px 5px; margin-top: 4px; border: 1px solid var(--accent); border-radius: 4px; outline: none; }

  /* 右側：週看板檢視 */
  .week-view-container { display: flex; flex-direction: column; gap: 10px; }
  .bubble-banner { background: #FFF3CD; border: 1px dashed #E6AD12; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #664D03; display: none; }

  .week-kanban { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; align-items: start; }
  .kanban-col { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); min-height: 480px; display: flex; flex-direction: column; padding: 12px 8px; }
  .kanban-col.is-today { border: 1.5px solid var(--accent); background: #FAF9F6; }
  
  .kanban-header { text-align: center; border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 10px; cursor: pointer; }
  .kanban-header .dow { font-size: 11px; color: var(--muted); display: block; font-weight: 500; }
  .kanban-header .num { font-size: 16px; font-weight: 700; font-family: 'Noto Serif TC', serif; }
  .kanban-col.is-today .kanban-header .num { color: var(--bg); background: var(--accent); border-radius: 50%; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; }

  .kanban-task-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; cursor: pointer; }
  .kanban-task-item { background: var(--bg); padding: 6px 8px; border-radius: 6px; font-size: 12.5px; display: flex; gap: 6px; align-items: flex-start; border-left: 3px solid var(--tag-none); }
  .kanban-task-item.done { opacity: 0.55; }
  .kanban-task-item.postponed { opacity: 0.5; background: #ECEAE6; border-left-style: dashed; }
  .kanban-task-item .dot-indicator { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
  .kanban-task-item.done .dot-indicator { background: var(--done); }
  .kanban-task-item .text-span { flex: 1; word-break: break-word; line-height: 1.35; }
  .kanban-task-item.done .text-span { text-decoration: line-through; color: var(--done); }

  /* 看板下方記帳與小總計區塊 */
  .kanban-accounting-summary { margin-top: auto; border-top: 1px dashed var(--line); padding-top: 8px; display: flex; flex-direction: column; gap: 4px; font-size: 11px; cursor: pointer; }
  .accounting-badge-list { display: flex; flex-wrap: wrap; gap: 3px; max-height: 38px; overflow: hidden; }
  .accounting-badge { background: #ECEAE6; color: var(--ink); padding: 1px 4px; border-radius: 4px; font-size: 10px; }
  .accounting-total-label { color: var(--accent); font-weight: 700; text-align: right; }

  /* ---------- 月檢視樣式優化 ---------- */
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .month-dow { text-align: center; font-size: 13px; font-weight: 700; color: var(--muted); padding-bottom: 8px; border-bottom: 1px solid var(--line); }
  .month-day { 
    aspect-ratio: 1 / 1; 
    border-radius: var(--radius); 
    border: 1px solid var(--line); 
    background: var(--card); 
    padding: 8px; 
    cursor: pointer; 
    display: flex; 
    flex-direction: column; 
    align-items: flex-start; 
    position: relative; 
    overflow: hidden; 
    box-shadow: var(--shadow);
    min-height: 90px;
  }
  .month-day.empty { background: transparent; border: none; box-shadow: none; cursor: default; }
  .month-day .day-num { font-size: 14px; font-weight: 700; font-family: 'Noto Serif TC', serif; color: var(--ink); }
  .month-day.today-active { border: 2px solid var(--accent); background: #FAF9F6; }
  .month-day.today-active .day-num { color: var(--bg); background: var(--accent); border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; }

  /* ---------- 日期詳情彈出卡 ---------- */
  #day-detail{display:none; margin-top:24px;}
  #day-detail.visible{display:block;}
  .detail-card{ background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border-left:4px solid var(--accent); padding:20px 22px; position:relative; border-top: 1px solid var(--line); }
  .detail-card .detail-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px; }
  .detail-card .detail-date{font-size:18px; font-family:'Noto Serif TC',serif; font-weight:700;}
  .detail-card .detail-sub{font-size:12px; color:var(--muted); margin-left:8px;}
  .close-detail{border:none; background:none; color:var(--muted); font-size:24px; cursor:pointer; padding:2px 6px;}

  .task-list{margin-bottom:18px; border-bottom: 1px dashed var(--line); padding-bottom: 12px;}
  .task-item{ display:flex; align-items:flex-start; gap:10px; padding:6px 0; font-size:14.5px; }
  .task-checkbox{ flex:0 0 auto; width:19px; height:19px; border-radius:5px; border:1.5px solid var(--line); cursor:pointer; display:flex; align-items:center; justify-content:center; background:var(--card); }
  .task-checkbox.checked{background:var(--accent); border-color:var(--accent);}
  .task-checkbox.checked::after{ content:''; width:9px; height:6px; border-left:2px solid white; border-bottom:2px solid white; transform:rotate(-45deg) translate(0,-1px); }
  .task-text{flex:1; word-break:break-word; line-height:1.5;}
  .task-text.done{color:var(--done); text-decoration:line-through;}
  .task-text.postponed{color:var(--muted); font-style:italic;}
  .task-del{ border:none; background:none; color:var(--muted); opacity:0; cursor:pointer; font-size:16px; padding:0 6px; }
  .task-item:hover .task-del{opacity:0.6;}
  .postpone-btn { border: 1px solid var(--line); background: var(--card); color: var(--accent); font-size: 10.5px; border-radius: 4px; padding: 2px 6px; cursor: pointer; margin-left: 8px; }

  /* 💸 記帳輸入區塊 */
  .accounting-section { margin-bottom: 20px; background: #FAF9F6; padding: 12px; border-radius: 10px; border: 1px solid var(--line); }
  .accounting-section h4 { font-size: 13.5px; margin: 0 0 10px 0; color: var(--ink); display: flex; justify-content: space-between; }
  .ledger-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .ledger-row select { border: 1px solid var(--line); border-radius: 6px; padding: 6px; font-size: 13px; background: var(--card); outline: none; }
  .ledger-row input { flex: 1; border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none; }
  .ledger-row button { border: none; background: var(--ink); color: var(--bg); border-radius: 6px; padding: 0 14px; font-size: 13px; cursor: pointer; }
  .ledger-list { display: flex; flex-direction: column; gap: 5px; max-height: 150px; overflow-y: auto; }
  .ledger-item { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 5px 8px; border-radius: 4px; font-size: 12.5px; border: 1px solid var(--line); }
  .ledger-item .del-ledg { border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 14px; }

  .diary-section label{ font-size:11.5px; letter-spacing:0.15em; color:var(--muted); font-weight:500; display:block; margin-bottom:6px; }
  .diary-section textarea{ width:100%; min-height:100px; border:1px solid var(--line); border-radius:10px; padding:12px 14px; font-size:14px; line-height:1.6; resize:vertical; background:var(--bg); outline:none; }
  .save-indicator{font-size:11px; color:var(--muted); margin-top:6px; height:14px;}
  #loading-screen{ position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:200; color:var(--muted); font-size:13px; letter-spacing:0.1em; }

  @media (max-width:1024px){ .workspace-layout { grid-template-columns: 1fr; } .week-kanban { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width:680px){ .week-kanban { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width:480px){ .week-kanban { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="loading-screen">載入中 ···</div>

<div id="login-screen" style="display:none;">
  <div class="brand-mark">JOURNAL · PLANNER</div>
  <h1>P人消滅計畫</h1>
  <h6>procrastination<br><i>noun[U]</i><br>We need decisive action.</h6>
  <button class="google-btn" id="google-login-btn">
    <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.5 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.5 29.6 4 24 4c-7.4 0-13.8 4.2-17 10.7z"/><path fill="#4CAF50" d="M24 44c5.4 0 10.3-2.1 14-5.5l-6.5-5.4C29.4 35 26.8 36 24 36c-5.3 0-9.7-3.1-11.3-7.6l-6.6 5.1C9.9 39.7 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.4 5.6-6.3 7.1l6.5 5.4C39.5 37.2 44 31.5 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
    使用 Google 帳號登入
  </button>
  <div id="login-error"></div>
</div>

<div id="app">
  <header class="topbar">
    <div class="topbar-left">
      <span class="eyebrow">KANBAN & LEDGER</span>
      <h1>P人自有妙計</h1>
    </div>
    <div class="topbar-right">
      <img id="user-avatar" src="" alt="使用者">
      <button id="logout-btn">登出</button>
    </div>
  </header>

  <div class="control-row">
    <div class="view-switch">
      <button id="btn-week-view" class="active">週計畫</button>
      <button id="btn-month-view">月計畫</button>
    </div>

    <div class="nav-row">
      <button id="nav-prev">‹</button>
      <span class="period-label" id="period-label">—</span>
      <button id="nav-next">›</button>
      <button class="today-btn" id="nav-today">今天</button>
    </div>

    <div class="week-title-area" id="week-title-container">
      <span class="week-title-display" id="week-title-text">點擊命名</span>
      <input type="text" class="week-title-input" id="week-title-input" placeholder="例：開學週">
      <button class="week-title-btn" id="week-title-edit-btn">🖉</button>
    </div>
  </div>

  <div class="workspace-layout">
    
    <div class="side-panel">
      <div class="dashboard-grid">
        <div class="stat-mini-box score-box-dark">
          <div class="title" id="score-month-label">當月戰力值</div>
          <div class="num" id="total-score-display">0</div>
        </div>
        <div class="stat-mini-box">
          <div class="title">本週 / 本月支出</div>
          <div class="num" id="expense-summary-display" style="font-size:16px; margin-top:4px; font-family:sans-serif;">$0 / $0</div>
        </div>
      </div>

      <div class="panel-card">
        <h3>本月目標</h3>
        <textarea class="month-goal-textarea" id="month-goal-input" placeholder="寫下這個月的核心目標與願景 ···"></textarea>
        <div class="save-indicator" id="month-goal-indicator" style="text-align:right;"></div>
      </div>

      <div class="panel-card">
        <h3>本週計畫</h3>
        <div class="color-picker">
          <span style="font-size:11px; color:var(--muted); margin-right:4px;"></span>
          <div class="color-dot active" data-color="none" style="background:var(--tag-none)"></div>
          <div class="color-dot" data-color="red" style="background:var(--tag-red)"></div>
          <div class="color-dot" data-color="green" style="background:var(--tag-green)"></div>
          <div class="color-dot" data-color="blue" style="background:var(--tag-blue)"></div>
          <div class="color-dot" data-color="yellow" style="background:var(--tag-yellow)"></div>
          <div class="color-dot" data-color="gray" style="background:var(--tag-gray)"></div>
          <div class="color-dot" data-color="purple" style="background:var(--tag-purple)"></div>
        </div>
        <div class="pool-input-area">
          <div class="pool-input-row">
            <input type="text" id="pool-task-input" placeholder="輸入計畫 ···">
            <button id="pool-task-add-btn">注入</button>
          </div>
          <input type="text" id="pool-task-note" class="pool-note-input" placeholder=" 備註 ···">
        </div>
        <div class="pool-list" id="pool-list"></div>
      </div>
    </div>

    <div class="main-content-view">
      <div class="week-view-container">

<script>
/* ============================================================
   Firebase 配置區
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBXy28clA40B41r_iyEXzWtkH21k1MPnG0",
  authDomain: "daily-schedule-hahaha.firebaseapp.com",
  projectId: "daily-schedule-hahaha",
  storageBucket: "daily-schedule-hahaha.firebasestorage.app",
  messagingSenderId: "26149222039",
  appId: "1:26149222039:web:ec299f4513c589935f5bd2",
  measurementId: "G-C6YBPTTRFY"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ============================================================
   全域變數
   ============================================================ */
let currentUser = null;
let currentView = 'week';        
let anchorDate = new Date();      
let selectedDateStr = null;       
let daysData = {};                
let weeksMeta = {};               
let monthsMeta = {};              
let globalPool = [];              
let scoreLogs = [];               
let selectedPoolColor = 'none';

let unsubscribeDays = null;
let unsubscribeWeeks = null;
let unsubscribeMonths = null;
let unsubscribePool = null;
let unsubscribeScores = null;

let diarySaveTimer = null;
let monthGoalTimer = null;

const WEEKDAY_LABELS = ['一','二','三','四','五','六','日'];
const WEEKDAY_LABELS_SHORT = ['週一','週二','週三','週四','週五','週六','週日'];
const MORANDI_COLORS = { none: '#E8E3DA', red: '#B87D73', green: '#8A9A86', blue: '#7E8F9F', yellow: '#C2A675', gray: '#9FA09E', purple: '#A294B8' };

function pad2(n){ return String(n).padStart(2,'0'); }
function toDateStr(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function fromDateStr(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function isSameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function toMonthStr(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }

function getMondayOfWeek(d){
  const date = new Date(d); const dow = date.getDay(); 
  const diff = (dow === 0 ? -6 : 1 - dow); 
  date.setDate(date.getDate() + diff); date.setHours(0,0,0,0);
  return date;
}

function getWeekIdentifier(d) {
  const mon = getMondayOfWeek(d); const year = mon.getFullYear();
  const startOfYear = new Date(year, 0, 1);
  const pastDays = Math.floor((mon - startOfYear) / 86400000);
  return `${year}-W${pad2(Math.ceil((pastDays + startOfYear.getDay() + 1) / 7))}`;
}

function addDays(d, n){ const date = new Date(d); date.setDate(date.getDate() + n); return date; }
function addMonths(d, n){ const date = new Date(d); date.setMonth(date.getMonth() + n); return date; }
function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

/* ============================================================
   分數記錄核心與支出計算
   ============================================================ */
async function logScoreChange(points, reason, targetDateStr) {
  if (!currentUser) return;
  const refDate = targetDateStr ? fromDateStr(targetDateStr) : anchorDate;
  await db.collection('users').doc(currentUser.uid).collection('scores').add({
    points: points, reason: reason, monthStr: toMonthStr(refDate), dateStr: targetDateStr || toDateStr(anchorDate),
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  });
}

function updateGlobalStatsUI() {
  if (!currentUser) return;
  const currentMonthStr = toMonthStr(anchorDate);
  document.getElementById('score-month-label').textContent = `${anchorDate.getMonth()+1}月 戰力值`;
  
  const currentMon = getMondayOfWeek(anchorDate);
  const currentSun = addDays(currentMon, 6);
  currentSun.setHours(23, 59, 59, 999);
  const sundayDeadline = currentSun.getTime();

  const monthlyPoints = scoreLogs
    .filter(log => {
      const logTime = log.timestamp ? log.timestamp.toDate().getTime() : Date.now();
      return log.monthStr === currentMonthStr && logTime <= sundayDeadline;
    })
    .reduce((sum, log) => sum + log.points, 0);

  const scoreDisplay = document.getElementById('total-score-display');
  scoreDisplay.textContent = monthlyPoints >= 0 ? `+${monthlyPoints}` : monthlyPoints;
  scoreDisplay.className = 'num ' + (monthlyPoints >= 0 ? 'positive' : 'negative');

  const mon = getMondayOfWeek(anchorDate);
  const weekDates = [];
  for(let i=0; i<7; i++) weekDates.push(toDateStr(addDays(mon, i)));

  let weeklyExpenseSum = 0;
  let monthlyExpenseSum = 0;

  Object.keys(daysData).forEach(dStr => {
    const dayLedger = daysData[dStr].ledger || [];
    const dayTotal = dayLedger.reduce((s, item) => s + (item.amount || 0), 0);
    
    if (weekDates.includes(dStr)) weeklyExpenseSum += dayTotal;
    if (dStr.startsWith(currentMonthStr)) monthlyExpenseSum += dayTotal;
  });

  document.getElementById('expense-summary-display').textContent = `$${weeklyExpenseSum} / $${monthlyExpenseSum}`;
}

/* ============================================================
   認證與資料監聽
   ============================================================ */
document.querySelectorAll('.color-picker .color-dot').forEach(dot => {
  dot.addEventListener('click', (e) => {
    document.querySelectorAll('.color-picker .color-dot').forEach(d => d.classList.remove('active'));
    e.target.classList.add('active'); selectedPoolColor = e.target.dataset.color;
  });
});

const googleProvider = new firebase.auth.GoogleAuthProvider();
document.getElementById('google-login-btn').addEventListener('click', () => {
  document.getElementById('login-error').textContent = '';
  auth.signInWithPopup(googleProvider).catch(() => { document.getElementById('login-error').textContent = '登入失敗，請重試。'; });
});
document.getElementById('logout-btn').addEventListener('click', () => { auth.signOut(); });

auth.onAuthStateChanged(user => {
  document.getElementById('loading-screen').style.display = 'none';
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('user-avatar').src = user.photoURL || '';
    attachFirestoreListeners();
  } else {
    currentUser = null; detachListeners();
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').classList.remove('visible');
  }
});

function attachFirestoreListeners() {
  const userDocRef = db.collection('users').doc(currentUser.uid);

  unsubscribeDays = userDocRef.collection('days').onSnapshot(snapshot => {
    snapshot.docChanges().forEach(change => {
      const dateStr = change.doc.id;
      if (change.type === 'removed') delete daysData[dateStr];
      else daysData[dateStr] = change.doc.data();
    });
    checkAndSyncWeekPlans();
    renderCurrentView();
    if (selectedDateStr) renderDayDetail(selectedDateStr);
  });

  unsubscribeWeeks = userDocRef.collection('weeks').onSnapshot(snapshot => {
    snapshot.docChanges().forEach(change => { if (change.type !== 'removed') weeksMeta[change.doc.id] = change.doc.data(); });
    updateWeekTitleUI();
  });

  unsubscribeMonths = userDocRef.collection('months').onSnapshot(snapshot => {
    snapshot.docChanges().forEach(change => { if (change.type !== 'removed') monthsMeta[change.doc.id] = change.doc.data(); });
    updateMonthGoalUI();
  });
  
  unsubscribePool = userDocRef.collection('pool').onSnapshot(snapshot => {
    globalPool = []; snapshot.forEach(doc => { globalPool.push({ id: doc.id, ...doc.data() }); });
    globalPool.sort((a, b) => a.id.localeCompare(b.id));
    renderPoolUI();
  });

  unsubscribeScores = userDocRef.collection('scores').onSnapshot(snapshot => {
    scoreLogs = []; snapshot.forEach(doc => { scoreLogs.push(doc.data()); });
    updateGlobalStatsUI();
  });
}

function detachListeners() {
  if (unsubscribeDays) unsubscribeDays(); if (unsubscribeWeeks) unsubscribeWeeks();
  if (unsubscribeMonths) unsubscribeMonths(); if (unsubscribePool) unsubscribePool();
  if (unsubscribeScores) unsubscribeScores();
}

function getDayData(dateStr) { return daysData[dateStr] || { tasks: [], diary: '', ledger: [] }; }

/* ============================================================
   任務管理邏輯
   ============================================================ */
async function addDistributedTask(dateStr, text, color, note, parentId) {
  const current = getDayData(dateStr);
  const taskId = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const tasks = [...(current.tasks || []), { id: taskId, text: text, done: false, color: color, note: note, parentId: parentId }];
  await db.collection('users').doc(currentUser.uid).collection('days').doc(dateStr).set({ tasks }, { merge: true });
}

async function toggleTask(dateStr, taskId) {
  const current = getDayData(dateStr); let pointsToAward = 0;
  const tasks = (current.tasks || []).map(t => {
    if (t.id === taskId) {
      const nextDone = !t.done; pointsToAward = nextDone ? 1 : -1;
      return { ...t, done: nextDone };
    }
    return t;
  });
  await db.collection('users').doc(currentUser.uid).collection('days').doc(dateStr).set({ tasks }, { merge: true });
  if (pointsToAward !== 0) await logScoreChange(pointsToAward, pointsToAward > 0 ? "完成分配任務" : "取消任務完成", dateStr);
  setTimeout(() => { checkAndSyncWeekPlans(); }, 300);
}

async function deleteTask(dateStr, taskId) {
  const current = getDayData(dateStr);
  const tasks = (current.tasks || []).filter(t => t.id !== taskId);
  await db.collection('users').doc(currentUser.uid).collection('days').doc(dateStr).set({ tasks }, { merge: true });
  setTimeout(() => { checkAndSyncWeekPlans(); }, 300);
}

async function postponeTaskToTomorrow(dateStr, taskId) {
  const current = getDayData(dateStr); let taskToMove = null;
  const tasks = (current.tasks || []).map(t => {
    if (t.id === taskId) { taskToMove = t; return { ...t, postponed: true }; }
    return t;
  });
  if (!taskToMove) return;

  await db.collection('users').doc(currentUser.uid).collection('days').doc(dateStr).set({ tasks }, { merge: true });
  const tomorrowStr = toDateStr(addDays(fromDateStr(dateStr), 1));
  await addDistributedTask(tomorrowStr, `[續] ${taskToMove.text}`, taskToMove.color, taskToMove.note, taskToMove.parentId);
  
  await logScoreChange(-3, `延宕任務「${taskToMove.text}」至明天`, dateStr);
  alert('已流向明天！分數 －３ 🩸');
}

function checkAndSyncWeekPlans() {
  if (!currentUser) return;
  globalPool.forEach(async (plan) => {
    if (!plan.assignedDates || plan.assignedDates.length === 0) return;
    let allDone = true;
    for (const dStr of plan.assignedDates) {
      const matchTask = (getDayData(dStr).tasks || []).find(t => t.parentId === plan.id);
      if (!matchTask || !matchTask.done) { allDone = false; break; }
    }
    const nextStatus = allDone ? 'completed' : 'pending';
    if (plan.status !== nextStatus) {
      await db.collection('users').doc(currentUser.uid).collection('pool').doc(plan.id).update({ status: nextStatus });
    }
  });
}

/* ============================================================
   ✐ 備註編輯
   ============================================================ */
function enableInlineNoteEdit(element, id, collectionType, dateStr = null, taskId = null) {
  element.addEventListener('click', (e) => {
    e.stopPropagation();
    const currentNoteText = element.dataset.rawNote || '';
    const input = document.createElement('input');
    input.type = 'text'; input.className = 'note-edit-input'; input.value = currentNoteText;
    
    const saveNoteUpdate = async () => {
      const newNote = input.value.trim();
      if (newNote === currentNoteText) { renderCurrentView(); return; }
      if (collectionType === 'pool') {
        await db.collection('users').doc(currentUser.uid).collection('pool').doc(id).update({ note: newNote });
      } else if (collectionType === 'days' && dateStr && taskId) {
        const currentData = getDayData(dateStr);
        const updatedTasks = (currentData.tasks || []).map(t => t.id === taskId ? { ...t, note: newNote } : t);
        await db.collection('users').doc(currentUser.uid).collection('days').doc(dateStr).set({ tasks: updatedTasks }, { merge: true });
      }
    };
    input.addEventListener('keydown', (evt) => { if (evt.key === 'Enter') saveNoteUpdate(); });
    input.addEventListener('blur', saveNoteUpdate);
    element.replaceWith(input); input.focus();
  });
}

async function checkAndCarryOverBubbles() {
  if (!currentUser) return;
  const now = new Date();
  const currentMon = getMondayOfWeek(anchorDate);
  const currentSun = addDays(currentMon, 6);
  currentSun.setHours(23, 59, 59, 999);

  if (now.getTime() < currentSun.getTime()) {
    document.getElementById('bubble-banner').style.display = 'none';
    return;
  }

  const currentWeekId = getWeekIdentifier(anchorDate);
  const overdueTasks = globalPool.filter(item => item.status === 'pending' && item.weekId && item.weekId < currentWeekId);
  
  if (overdueTasks.length === 0) { 
    document.getElementById('bubble-banner').style.display = 'none'; 
    return; 
  }

  const batch = db.batch();
  const lastSundayStr = toDateStr(currentSun);

  for (const item of overdueTasks) {
    batch.update(db.collection('users').doc(currentUser.uid).collection('pool').doc(item.id), { 
      weekId: currentWeekId, 
      isBubble: true 
    });
    await logScoreChange(-5, `週計畫「${item.text}」未落實，結算觸發漂流`, lastSundayStr);
  }
  
  await batch.commit();
  document.getElementById('bubble-banner').style.display = 'block';
  setTimeout(() => { document.getElementById('bubble-banner').style.display = 'none'; }, 5000);
}

/* ============================================================
   💸 記帳運算增刪
   ============================================================ */
async function addLedgerItem() {
  if (!selectedDateStr) return;
  const catSelect = document.getElementById('ledger-category');
  const amtInput = document.getElementById('ledger-amount');
  const category = catSelect.value;
  const amount = parseInt(amtInput.value, 10);

  if (isNaN(amount) || amount <= 0) { alert('請輸入正確的金額！'); return; }

  const current = getDayData(selectedDateStr);
  const currentLedger = current.ledger || [];
  const newItem = { id: 'ledg_' + Date.now().toString(36), category, amount };

  await db.collection('users').doc(currentUser.uid).collection('days').doc(selectedDateStr).set({
    ledger: [...currentLedger, newItem]
  }, { merge: true });

  amtInput.value = '';
}

async function deleteLedgerItem(itemId) {
  if (!selectedDateStr) return;
  const current = getDayData(selectedDateStr);
  const updatedLedger = (current.ledger || []).filter(item => item.id !== itemId);
  await db.collection('users').doc(currentUser.uid).collection('days').doc(selectedDateStr).set({ ledger: updatedLedger }, { merge: true });
}

/* ============================================================
   ✨ 特殊日子多筆增刪邏輯
   ============================================================ */
async function addSpecialDayItem() {
  if (!selectedDateStr) return;
  const input = document.getElementById('special-day-input');
  const text = input.value.trim();
  if (!text) return;

  const data = getDayData(selectedDateStr);
  let specialDays = Array.isArray(data.specialDays) ? data.specialDays : [];
  
  // 舊資料相容處理
  if (data.specialDay && specialDays.length === 0) {
    specialDays.push({ id: 'sp_old', text: data.specialDay });
  }

  const newItem = {
    id: 'sp_' + Date.now().toString(36) + Math.random().toString(36).slice(2,4),
    text: text
  };

  specialDays.push(newItem);

  await db.collection('users').doc(currentUser.uid).collection('days').doc(selectedDateStr).set({
    specialDays: specialDays,
    specialDay: firebase.firestore.FieldValue.delete()
  }, { merge: true });

  input.value = '';
}

async function deleteSpecialDayItem(itemId) {
  if (!selectedDateStr) return;
  const data = getDayData(selectedDateStr);
  if (!data.specialDays) return;

  const updated = data.specialDays.filter(item => item.id !== itemId);
  await db.collection('users').doc(currentUser.uid).collection('days').doc(selectedDateStr).set({
    specialDays: updated
  }, { merge: true });
}

document.getElementById('add-special-day-btn').addEventListener('click', addSpecialDayItem);
document.getElementById('special-day-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') addSpecialDayItem(); });

/* ============================================================
   介面渲染群
   ============================================================ */
function renderPoolUI() {
  const container = document.getElementById('pool-list'); if (!container) return;
  container.innerHTML = '';
  const currentWeekId = getWeekIdentifier(anchorDate);
  const thisWeekTasks = globalPool.filter(item => item.weekId === currentWeekId);

  if (thisWeekTasks.length === 0) {
    container.innerHTML = `<div style="font-size:12px; color:var(--muted); font-style:italic; padding:10px;">欸！！這週沒事做嗎？</div>`;
    return;
  }
  const monday = getMondayOfWeek(anchorDate);

  thisWeekTasks.forEach(item => {
    const div = document.createElement('div'); div.className = 'pool-item';
    div.style.borderLeft = `4px solid ${MORANDI_COLORS[item.color || 'none']}`;
    if (item.status === 'completed') div.style.opacity = '0.55';
    
    let checkboxesHtml = '';
    for(let i=0; i<7; i++) {
      const dStr = toDateStr(addDays(monday, i));
      const alreadyAssigned = (item.assignedDates || []).includes(dStr);
      checkboxesHtml += `
        <label style="display:inline-flex; align-items:center; font-size:11px; margin-right:5px; color:var(--muted);">
          <input type="checkbox" class="assign-check" value="${dStr}" ${alreadyAssigned ? 'checked' : ''}>${WEEKDAY_LABELS_SHORT[i].replace('週','')}
        </label>`;
    }

    const displayNote = item.note ? `✐ ${item.note} ` : `✐  ···`;
    const noteSpanHtml = `<span class="editable-note-span" id="note-pool-${item.id}">${escapeHtml(displayNote)}</span>`;
    let badgeHtml = item.isBubble ? `<span style="font-size:9px; background:#C75D3D; color:#fff; padding:1px 4px; border-radius:3px; margin-right:4px;">🫧 漂流泡泡 －５</span>` : '';

    div.innerHTML = `
      <div style="display:flex; align-items:flex-start; padding-right:20px;">
        <div style="flex:1;">
          <span class="pool-item-text" style="${item.status === 'completed' ? 'text-decoration:line-through; color:var(--done);' : ''}">${badgeHtml}${escapeHtml(item.text)}</span>
          ${noteSpanHtml}
        </div>
      </div>
      <button class="pool-item-del">×</button>
      <div class="assign-checkboxes" style="margin-top:6px; border-top:1px dashed var(--line); padding-top:6px;">
        ${checkboxesHtml} <button class="confirm-assign-btn" style="font-size:10px; border:none; background:var(--ink); color:var(--bg); border-radius:4px; padding:2px 5px; cursor:pointer;">分配</button>
      </div>
    `;

    const noteSpanEl = div.querySelector(`#note-pool-${item.id}`);
    noteSpanEl.dataset.rawNote = item.note || ''; enableInlineNoteEdit(noteSpanEl, item.id, 'pool');

    div.querySelector('.confirm-assign-btn').addEventListener('click', async () => {
      const checkedBoxes = div.querySelectorAll('.assign-check:checked');
      const selectedDates = Array.from(checkedBoxes).map(cb => cb.value);
      
      for(let i=0; i<7; i++) {
        const targetDStr = toDateStr(addDays(monday, i));
        const dayData = getDayData(targetDStr);
        if(dayData.tasks) {
          const cleanTasks = dayData.tasks.filter(t => t.parentId !== item.id);
          await db.collection('users').doc(currentUser.uid).collection('days').doc(targetDStr).set({ tasks: cleanTasks }, { merge: true });
        }
      }

      await db.collection('users').doc(currentUser.uid).collection('pool').doc(item.id).update({ assignedDates: selectedDates });
      for (const chosenDate of selectedDates) {
        await addDistributedTask(chosenDate, item.text, item.color || 'none', item.note || '', item.id);
      }
      alert('指派分配成功！');
    });

    div.querySelector('.pool-item-del').addEventListener('click', async () => {
      if(confirm('確定要刪除這個週計畫嗎？相關日指派也會取消。')) {
        await db.collection('users').doc(currentUser.uid).collection('pool').doc(item.id).delete();
      }
    });

    container.appendChild(div);
  });
}

function renderWeekKanbanView() {
  const monday = getMondayOfWeek(anchorDate);
  const sunday = addDays(monday, 6);
  document.getElementById('period-label').textContent = `${monday.getFullYear()}/${pad2(monday.getMonth()+1)}/${pad2(monday.getDate())} – ${pad2(sunday.getMonth()+1)}/${pad2(sunday.getDate())}`;

  const container = document.getElementById('week-view'); container.innerHTML = '';
  const today = new Date();

  for (let i = 0; i < 7; i++) {
    const d = addDays(monday, i); const dateStr = toDateStr(d);
    const data = getDayData(dateStr); const tasks = data.tasks || []; const ledger = data.ledger || [];

    const col = document.createElement('div'); col.className = 'kanban-col' + (isSameDay(d, today) ? ' is-today' : '');
    const header = document.createElement('div'); header.className = 'kanban-header';

    // 週看板：支援多筆特殊日子標籤顯示
    let specialDayBadgeHtml = '';
    let weekSpDays = [];
    if (Array.isArray(data.specialDays)) weekSpDays = data.specialDays;
    else if (data.specialDay) weekSpDays = [{ text: data.specialDay }];

    if (weekSpDays.length > 0) {
      specialDayBadgeHtml = `<div style="display:flex; flex-direction:column; gap:2px; margin-top:4px;">`;
      weekSpDays.forEach(sp => {
        specialDayBadgeHtml += `<div style="font-size:10.5px; background:#EADDD6; color:#C75D3D; padding:1px 5px; border-radius:4px; font-weight:bold; display:inline-block; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">✨ ${escapeHtml(sp.text)}</div>`;
      });
      specialDayBadgeHtml += `</div>`;
    }
  
    header.innerHTML = `<span class="dow">${WEEKDAY_LABELS_SHORT[i]}</span><span class="num">${d.getDate()}</span>${specialDayBadgeHtml}`;
    header.addEventListener('click', () => openDayDetail(dateStr));

    const taskListContainer = document.createElement('div'); taskListContainer.className = 'kanban-task-list';
    taskListContainer.addEventListener('click', () => openDayDetail(dateStr));

    if (tasks.length === 0) {
      taskListContainer.innerHTML = `<div style="font-size:11px; color:var(--muted); font-style:italic; text-align:center; padding-top:10px;">輕輕鬆鬆</div>`;
    } else {
      tasks.forEach(t => {
        const item = document.createElement('div'); item.className = 'kanban-task-item' + (t.done ? ' done' : '') + (t.postponed ? ' postponed' : '');
        item.style.borderLeftColor = MORANDI_COLORS[t.color || 'none'];
        item.innerHTML = `<span class="dot-indicator"></span><span class="text-span">${escapeHtml(t.text)}${t.note ? ' ✐':''}${t.postponed ? ' ↪️':''}</span>`;
        taskListContainer.appendChild(item);
      });
    }

    const accountingSummaryDiv = document.createElement('div');
    accountingSummaryDiv.className = 'kanban-accounting-summary';
    accountingSummaryDiv.addEventListener('click', () => openDayDetail(dateStr));
    
    let dayTotalSpend = ledger.reduce((sum, item) => sum + (item.amount || 0), 0);
    let badgesHtml = ledger.slice(0, 4).map(l => `<span class="accounting-badge">${l.category}:${l.amount}</span>`).join('');
    if(ledger.length > 4) badgesHtml += `<span class="accounting-badge">...</span>`;

    accountingSummaryDiv.innerHTML = `
      <div class="accounting-badge-list">${badgesHtml || '<span style="color:var(--muted); font-style:italic; font-size:10px;">荷包守衛</span>'}</div>
      <div class="accounting-total-label">${dayTotalSpend > 0 ? `－ $${dayTotalSpend}` : ''}</div>
    `;

    col.appendChild(header);
    col.appendChild(taskListContainer);
    col.appendChild(accountingSummaryDiv);
    container.appendChild(col);
  }
}

/* ============================================================
   月檢視渲染函數
   ============================================================ */
function renderMonthView() {
  const dowRow = document.getElementById('month-dow-row');
  const grid = document.getElementById('month-grid');
  
  if (!dowRow || !grid) return;
  
  dowRow.innerHTML = WEEKDAY_LABELS_SHORT.map(label => `<div class="month-dow">${label}</div>`).join('');
  grid.innerHTML = '';

  const year = anchorDate.getFullYear();
  const month = anchorDate.getMonth();
  
  document.getElementById('period-label').textContent = `${year}年 ${pad2(month + 1)}月`;

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);

  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6; 

  const totalDays = lastDay.getDate();

  for (let i = 0; i < startOffset; i++) {
    const empty = document.createElement('div');
    empty.className = 'month-day empty';
    grid.appendChild(empty);
  }

  for (let day = 1; day <= totalDays; day++) {
    const d = new Date(year, month, day);
    const dateStr = toDateStr(d);
    const data = getDayData(dateStr); 

    const dayDiv = document.createElement('div');
    dayDiv.className = 'month-day';

    if (dateStr === toDateStr(new Date())) {
      dayDiv.classList.add('today-active');
    }

    // 月檢視：支援多筆特殊日子標籤疊加顯示
    let specialDayHtml = '';
    let monthSpDays = [];
    if (data && Array.isArray(data.specialDays)) monthSpDays = data.specialDays;
    else if (data && data.specialDay) monthSpDays = [{ text: data.specialDay }];

    if (monthSpDays.length > 0) {
      specialDayHtml = `<div style="display:flex; flex-direction:column; gap:2px; margin-top:2px; width:100%; box-sizing:border-box; overflow:hidden;">`;
      monthSpDays.forEach(sp => {
        specialDayHtml += `
          <div style="
            font-size: 9.5px; 
            background: #FFF9F5; 
            color: #C75D3D; 
            padding: 1px 3px; 
            border-radius: 3px; 
            font-weight: bold; 
            text-overflow: ellipsis; 
            overflow: hidden; 
            white-space: nowrap;
            border: 1px solid #F5E6DA;
            width: 100%;
            box-sizing: border-box;
          " title="${escapeHtml(sp.text)}">
            ✨ ${escapeHtml(sp.text)}
          </div>
        `;
      });
      specialDayHtml += `</div>`;
    }

    const ledger = data.ledger || [];
    let dayTotalSpend = ledger.reduce((sum, item) => sum + (item.amount || 0), 0);
    let spendHtml = dayTotalSpend > 0 ? `<div style="font-size:10px; color:var(--accent); font-weight:700; margin-top:auto; align-self:flex-end;">-$${dayTotalSpend}</div>` : '';

    dayDiv.innerHTML = `
      <span class="day-num">${day}</span>
      ${specialDayHtml}
      ${spendHtml}
    `;

    dayDiv.addEventListener('click', () => {
      openDayDetail(dateStr);
    });

    grid.appendChild(dayDiv);
  }
}

/* ============================================================
   日詳情內嵌渲染
   ============================================================ */
function openDayDetail(dateStr) { selectedDateStr = dateStr; renderDayDetail(dateStr); document.getElementById('day-detail').style.display = 'block'; document.getElementById('day-detail').scrollIntoView({ behavior:'smooth', block:'nearest' }); }
document.getElementById('close-detail-btn').addEventListener('click', () => { document.getElementById('day-detail').style.display = 'none'; selectedDateStr = null; });

function renderDayDetail(dateStr) {
  const d = fromDateStr(dateStr);
  document.getElementById('detail-date-label').textContent = `${d.getFullYear()}/${pad2(d.getMonth()+1)}/${pad2(d.getDate())}`;
  document.getElementById('detail-dow-label').textContent = WEEKDAY_LABELS_SHORT[(d.getDay() + 6) % 7];

  const data = getDayData(dateStr);
  
  // 日詳情：渲染「多筆特殊日子」清單
  const specialListEl = document.getElementById('special-days-list');
  specialListEl.innerHTML = '';

  let specialDays = [];
  if (Array.isArray(data.specialDays)) {
    specialDays = data.specialDays;
  } else if (data.specialDay) {
    specialDays = [{ id: 'sp_old', text: data.specialDay }];
  }

  if (specialDays.length === 0) {
    specialListEl.innerHTML = `<div style="font-size:11px; color:var(--muted); font-style:italic;">今天是一般的小日子。</div>`;
  } else {
    specialDays.forEach(item => {
      const spDiv = document.createElement('div');
      spDiv.style = "display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12.5px; border: 1px solid #F5E6DA;";
      spDiv.innerHTML = `<span style="color: #C75D3D; font-weight: 500;">✨ ${escapeHtml(item.text)}</span><button class="del-sp" style="border:none; background:transparent; color:var(--muted); cursor:pointer; font-size:14px;">×</button>`;
      spDiv.querySelector('.del-sp').addEventListener('click', () => deleteSpecialDayItem(item.id));
      specialListEl.appendChild(spDiv);
    });
  }
  
  const tasks = data.tasks || []; const list = document.getElementById('task-list'); list.innerHTML = '';
  if (tasks.length === 0) {
    list.innerHTML = `<div style="font-size:12px; color:var(--muted); font-style:italic; padding:6px 0;">今天沒事做！</div>`;
  } else {
    tasks.forEach(t => {
      const item = document.createElement('div'); item.className = 'task-item';
      item.style.borderLeft = `3px solid ${MORANDI_COLORS[t.color || 'none']}`; 
      
      const displayNote = t.note ? `✐ ${t.note} (點擊編輯)` : `✐`;
      const noteSpanHtml = `<span class="editable-note-span" id="note-day-${t.id}">${escapeHtml(displayNote)}</span>`;
      const postponeBtnHtml = (!t.done && !t.postponed) ? `<button class="postpone-btn" id="postpone-btn-${t.id}">▶︎▶︎</button>` : '';

      item.innerHTML = `
        <div class="task-checkbox${t.done ? ' checked' : ''}"></div>
        <div style="flex:1; margin-left:6px;">
          <div class="task-text${t.done ? ' done' : ''}${t.postponed ? ' postponed' : ''}">${escapeHtml(t.text)} ${postponeBtnHtml}</div>
          ${noteSpanHtml}
        </div>
        <button class="task-del">×</button>
      `;
      
      item.querySelector('.task-checkbox').addEventListener('click', () => { if(!t.postponed) toggleTask(dateStr, t.id); });
      item.querySelector('.task-del').addEventListener('click', () => deleteTask(dateStr, t.id));
      if (postponeBtnHtml) {
        item.querySelector(`#postpone-btn-${t.id}`).addEventListener('click', (e) => { e.stopPropagation(); postponeTaskToTomorrow(dateStr, t.id); });
      }

      const noteSpanEl = item.querySelector(`#note-day-${t.id}`);
      noteSpanEl.dataset.rawNote = t.note || ''; enableInlineNoteEdit(noteSpanEl, t.id, 'days', dateStr, t.id);
      list.appendChild(item);
    });
  }

  const ledger = data.ledger || []; const ledgerListEl = document.getElementById('ledger-list'); ledgerListEl.innerHTML = '';
  let totalSpend = ledger.reduce((sum, item) => sum + (item.amount || 0), 0);
  document.getElementById('detail-day-spend-total').textContent = `共 $${totalSpend}`;

  if(ledger.length === 0) {
    ledgerListEl.innerHTML = `<div style="font-size:11px; color:var(--muted); font-style:italic;">今天沒有花錢~~~</div>`;
  } else {
    ledger.forEach(item => {
      const ledgDiv = document.createElement('div'); ledgDiv.className = 'ledger-item';
      ledgDiv.innerHTML = `<span><strong>[${escapeHtml(item.category)}]</strong> $${item.amount}</span><button class="del-ledg">×</button>`;
      ledgDiv.querySelector('.del-ledg').addEventListener('click', () => deleteLedgerItem(item.id));
      ledgerListEl.appendChild(ledgDiv);
    });
  }

  const textarea = document.getElementById('diary-textarea');
  if (document.activeElement !== textarea) textarea.value = data.diary || '';
  document.getElementById('save-indicator').textContent = '';
}

document.getElementById('add-ledger-btn').addEventListener('click', addLedgerItem);
document.getElementById('ledger-amount').addEventListener('keydown', (e) => { if (e.key === 'Enter') addLedgerItem(); });

document.getElementById('diary-textarea').addEventListener('input', e => { if (!selectedDateStr) return; scheduleDiarySave(selectedDateStr, e.target.value); });
function scheduleDiarySave(dateStr, text) {
  clearTimeout(diarySaveTimer); const indicator = document.getElementById('save-indicator'); indicator.textContent = '自動儲存中···';
  diarySaveTimer = setTimeout(async () => {
    await db.collection('users').doc(currentUser.uid).collection('days').doc(dateStr).set({ diary: text }, { merge: true });
    indicator.textContent = '已儲存 ✓';
  }, 800);
}

document.getElementById('month-goal-input').addEventListener('input', (e) => {
  clearTimeout(monthGoalTimer); const mStr = toMonthStr(anchorDate); const indicator = document.getElementById('month-goal-indicator'); indicator.textContent = '同步中 ···';
  monthGoalTimer = setTimeout(async () => {
    await db.collection('users').doc(currentUser.uid).collection('months').doc(mStr).set({ goal: e.target.value }, { merge: true });
    indicator.textContent = '儲存成功'; setTimeout(() => { indicator.textContent = ''; }, 1500);
  }, 800);
});
function updateMonthGoalUI() {
  const mStr = toMonthStr(anchorDate); const tx = document.getElementById('month-goal-input');
  if (document.activeElement !== tx) { tx.value = (monthsMeta[mStr] && monthsMeta[mStr].goal) ? monthsMeta[mStr].goal : ''; }
}

document.getElementById('btn-week-view').addEventListener('click', () => switchView('week'));
document.getElementById('btn-month-view').addEventListener('click', () => switchView('month'));
function switchView(view) {
  currentView = view;
  document.getElementById('btn-week-view').classList.toggle('active', view === 'week');
  document.getElementById('btn-month-view').classList.toggle('active', view === 'month');
  document.getElementById('week-view').style.display = view === 'week' ? 'grid' : 'none';
  document.getElementById('month-view').style.display = view === 'month' ? 'block' : 'none';
  renderCurrentView();
}
document.getElementById('nav-prev').addEventListener('click', () => { anchorDate = currentView === 'week' ? addDays(anchorDate, -7) : addMonths(anchorDate, -1); renderCurrentView(); });
document.getElementById('nav-next').addEventListener('click', () => { anchorDate = currentView === 'week' ? addDays(anchorDate, 7) : addMonths(anchorDate, 1); renderCurrentView(); });
document.getElementById('nav-today').addEventListener('click', () => { anchorDate = new Date(); renderCurrentView(); });

function renderCurrentView() {
  if (!currentUser) return;
  updateMonthGoalUI(); updateWeekTitleUI();
  checkAndCarryOverBubbles();
  renderPoolUI(); 
  updateGlobalStatsUI();
  if (currentView === 'week') renderWeekKanbanView(); else renderMonthView();
}

const editWeekBtn = document.getElementById('week-title-edit-btn');
const weekTitleText = document.getElementById('week-title-text');
const weekTitleInput = document.getElementById('week-title-input');
editWeekBtn.addEventListener('click', () => {
  if (weekTitleInput.style.display === 'none' || weekTitleInput.style.display === '') {
    weekTitleInput.style.display = 'inline-block'; weekTitleText.style.display = 'none';
    weekTitleInput.value = weekTitleText.textContent === '命名' ? '' : weekTitleText.textContent;
    weekTitleInput.focus(); editWeekBtn.textContent = '💾';
  } else { saveWeekTitle(); }
});
weekTitleInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') saveWeekTitle(); });
async function saveWeekTitle() {
  const wId = getWeekIdentifier(anchorDate); const val = weekTitleInput.value.trim();
  await db.collection('users').doc(currentUser.uid).collection('weeks').doc(wId).set({ title: val });
  weekTitleInput.style.display = 'none'; weekTitleText.style.display = 'inline-block'; editWeekBtn.textContent = '🖉';
}
function updateWeekTitleUI() {
  const wId = getWeekIdentifier(anchorDate);
  weekTitleText.textContent = (weeksMeta[wId] && weeksMeta[wId].title) ? weeksMeta[wId].title : '命名';
}

document.getElementById('pool-task-add-btn').addEventListener('click', addPoolItem);
document.getElementById('pool-task-input').addEventListener('keydown', (e) => { if(e.key==='Enter') addPoolItem(); });
async function addPoolItem() {
  const input = document.getElementById('pool-task-input'); const noteInput = document.getElementById('pool-task-note');
  const txt = input.value.trim(); const noteTxt = noteInput.value.trim(); if(!txt) return;
  const wId = getWeekIdentifier(anchorDate);
  await db.collection('users').doc(currentUser.uid).collection('pool').add({
    text: txt, color: selectedPoolColor, note: noteTxt, type: 'week', status: 'pending', weekId: wId, assignedDates: [],
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  input.value = ''; noteInput.value = '';
}

if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(err => console.warn(err)); }); }
</script>
</body>
